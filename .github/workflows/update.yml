name: 自动更新李无敌节点

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 获取IP并检查变化
        run: |
          curl -s https://raw.githubusercontent.com/love-ztm/cfip/refs/heads/main/ubest_ips.txt > temp.txt
          curl -s https://cf.junzhen.qzz.io/best_ips.txt >> temp.txt
          curl -s https://bestcf.pages.dev/cmliu/all.txt >> temp.txt

          sed -E 's/^([^#]+)#([A-Z]{2}) .*/\1#\2 李无敌/;s/^([^#]+)#CM优选 \| .* ([A-Z]{2}) \|.*/\1#\2 李无敌/' temp.txt | grep -E '#[A-Z]{2} 李无敌' > new.txt

          if [ -f liwudi.txt ]; then
            sed '1,2d' liwudi.txt > old.txt
          else
            touch old.txt
          fi

          if cmp -s new.txt old.txt; then
            echo "IP没有变化"
            exit 0
          fi

          TIME=$(TZ='Asia/Shanghai' date '+%m-%d %HH')

          echo "192.0.2.1:443#$TIME" > liwudi.txt
          cat new.txt >> liwudi.txt

      - name: 提交更新
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add liwudi.txt

          git commit -m "自动更新节点" || exit 0

          git push
